<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Регистрация</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Пароль">

  <select id="status">
    <option value="">Выбери статус</option>
    <option value="Учусь">Учусь</option>
    <option value="Работаю">Работаю</option>
    <option value="Отдыхаю">Отдыхаю</option>
  </select>

  <button onclick="register()">Зарегистрироваться</button>
  <p id="message"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = "https://omqqenqlalqzjsbjhqgz.supabase.co";
  const supabaseKey = "sb_publishable_MMUvjysVPwIxm7N8oSvTuA_9_3GZWU9";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  window.register = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const status = document.getElementById("status").value;
  const message = document.getElementById("message");

  if (!status) {
    message.innerText = "Выбери статус";
    return;
  }

  const { data, error } = await client.auth.signUp({
    email,
    password
  });

  console.log("SIGNUP:", data, error);

  if (error) {
    message.innerText = error.message;
    return;
  }

  if (!data.user) {
    message.innerText = "Проверь почту для подтверждения!";
    return;
  }

  const { error: insertError } = await client.from('profiles').insert({
    id: data.user.id,
    username: email,
    status: status
  });

  console.log("INSERT:", insertError);

  if (insertError) {
    message.innerText = insertError.message;
  } else {
    message.innerText = "Готово!";
  }
}
</script>

</body>
</html>
