<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Регистрация</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Пароль">
  <button onclick="register()">Зарегистрироваться</button>
  <p id="message"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabaseUrl = "https://omqqenqlalqzjsbjhqgz.supabase.co";
  const supabaseKey = "sb_publishable_MMUvjysVPwIxm7N8oSvTuA_9_3GZWU9";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  async function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    if (!email || !password) {
      message.innerText = "Заполни все поля";
      message.style.color = "red";
      return;
    }

    const { data, error } = await client.auth.signUp({
      email: email,
      password: password
    });

    if (error) {
      console.log(error);
      message.innerText = "Ошибка: " + error.message;
      message.style.color = "red";
    } else {
      console.log(data);
      message.innerText = "Успешно! Проверь почту.";
      message.style.color = "green";
    }
  }
</script>

</body>
</html>
