<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZXC Chat</title>

<style>

:root{
--bg:#0f172a;
--panel:#1e293b;
--text:#ffffff;
--accent:#6366f1;
--msgMe:#6366f1;
--msgOther:#334155;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:var(--panel);
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.sidebar h2{
margin:0;
}

.user{
padding:10px;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,0.05);
}

.user:hover{
background:rgba(255,255,255,0.1);
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.chatHeader{
padding:15px;
background:var(--panel);
font-weight:bold;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:10px 14px;
border-radius:14px;
max-width:60%;
word-wrap:break-word;
}

.me{
background:var(--msgMe);
align-self:flex-end;
}

.other{
background:var(--msgOther);
}

.send{
display:flex;
gap:10px;
padding:15px;
background:var(--panel);
}

input[type=text]{
flex:1;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
background:var(--accent);
border:none;
padding:10px 14px;
border-radius:10px;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.themeButtons{
display:flex;
gap:6px;
}

.themeButtons button{
padding:6px 10px;
font-size:12px;
}

/* LIGHT */

.theme-light{
--bg:#f1f5f9;
--panel:#ffffff;
--text:#111827;
--msgMe:#6366f1;
--msgOther:#e5e7eb;
}

/* DARK */

.theme-dark{
--bg:#0f172a;
--panel:#1e293b;
--text:#ffffff;
--msgMe:#6366f1;
--msgOther:#334155;
}

/* MASHA */

.theme-masha{
--bg:#fff0f6;
--panel:#ffd6e7;
--text:#5b0042;
--accent:#ff3e9e;
--msgMe:#ff3e9e;
--msgOther:#ffc2da;
}

img{
max-width:200px;
border-radius:10px;
}

/* MOBILE */

@media(max-width:700px){

.sidebar{
position:absolute;
z-index:10;
height:100%;
left:-260px;
transition:0.3s;
}

.sidebar.open{
left:0;
}

.menuBtn{
display:block;
}

}

.menuBtn{
display:none;
position:absolute;
top:15px;
left:15px;
font-size:20px;
cursor:pointer;
}

</style>
</head>

<body class="theme-dark">

<div class="menuBtn" id="menuBtn">☰</div>

<div class="sidebar" id="sidebar">

<h2>ZXC Chat</h2>

<div class="themeButtons">
<button onclick="setTheme('theme-dark')">🌙</button>
<button onclick="setTheme('theme-light')">☀️</button>
<button onclick="setTheme('theme-masha')">🌸</button>
</div>

<button id="googleLogin">Google Login</button>
<button id="logout" style="display:none">Logout</button>

<div id="users"></div>

</div>

<div class="chat">

<div class="chatHeader" id="chatTitle">
Выберите пользователя
</div>

<div class="messages" id="messages"></div>

<div class="send" id="sendForm" style="display:none">

<input type="text" id="messageText" placeholder="Сообщение">

<input type="file" id="messageFile">

<button id="sendMessage">➤</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
doc,
setDoc,
serverTimestamp,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
apiKey:"AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
authDomain:"zxc1234-668aa.firebaseapp.com",
projectId:"zxc1234-668aa",
storageBucket:"zxc1234-668aa.appspot.com",
messagingSenderId:"587825633345",
appId:"1:587825633345:web:2f098c987369bc934c0ec0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();


const googleLoginBtn = document.getElementById("googleLogin");
const logoutBtn = document.getElementById("logout");
const usersDiv = document.getElementById("users");
const messagesDiv = document.getElementById("messages");
const sendForm = document.getElementById("sendForm");
const messageText = document.getElementById("messageText");
const messageFile = document.getElementById("messageFile");
const sendMessageBtn = document.getElementById("sendMessage");
const chatTitle = document.getElementById("chatTitle");

let currentUser=null;
let currentChatId=null;
let messagesUnsub=null;


googleLoginBtn.onclick=async()=>{

await signInWithPopup(auth,provider)

}

logoutBtn.onclick=async()=>{

await signOut(auth)

}

onAuthStateChanged(auth,async user=>{

currentUser=user

if(user){

googleLoginBtn.style.display="none"
logoutBtn.style.display="block"
sendForm.style.display="flex"

await setDoc(doc(db,"users",user.uid),{

name:user.displayName,
email:user.email

},{merge:true})

loadUsers()

}else{

googleLoginBtn.style.display="block"
logoutBtn.style.display="none"
sendForm.style.display="none"

}

})


function loadUsers(){

onSnapshot(collection(db,"users"),snap=>{

usersDiv.innerHTML=""

snap.forEach(d=>{

if(d.id===currentUser.uid)return

const div=document.createElement("div")
div.className="user"
div.textContent=d.data().name
div.onclick=()=>openChat(d.id,d.data().name)

usersDiv.appendChild(div)

})

})

}



function openChat(uid,name){

chatTitle.textContent=name

currentChatId=[currentUser.uid,uid].sort().join("_")

const chatRef=doc(db,"chats",currentChatId)

setDoc(chatRef,{
users:[currentUser.uid,uid],
timestamp:serverTimestamp()
},{merge:true})

const messagesRef=collection(chatRef,"messages")

if(messagesUnsub)messagesUnsub()

messagesUnsub=onSnapshot(query(messagesRef,orderBy("timestamp")),snap=>{

messagesDiv.innerHTML=""

snap.forEach(d=>{

const data=d.data()

const div=document.createElement("div")
div.className="message "+(data.senderId===currentUser.uid?"me":"other")

if(data.text){

const p=document.createElement("div")
p.textContent=data.text
div.appendChild(p)

}

if(data.imageBase64){

const img=document.createElement("img")
img.src=data.imageBase64
div.appendChild(img)

}

messagesDiv.appendChild(div)

})

messagesDiv.scrollTop=messagesDiv.scrollHeight

})

}



sendMessageBtn.onclick=async()=>{

if(!currentChatId)return

const text=messageText.value.trim()

if(messageFile.files.length>0){

const file=messageFile.files[0]

const reader=new FileReader()

reader.onload=async()=>{

await send(text,reader.result)

}

reader.readAsDataURL(file)

}else{

await send(text,null)

}

messageText.value=""
messageFile.value=""

}


async function send(text,image){

if(!text && !image)return

const chatRef=doc(db,"chats",currentChatId)

const messagesRef=collection(chatRef,"messages")

await addDoc(messagesRef,{

senderId:currentUser.uid,
text:text,
imageBase64:image,
timestamp:serverTimestamp()

})

}


window.setTheme=(theme)=>{

document.body.className=theme

}

const sidebar=document.getElementById("sidebar")

document.getElementById("menuBtn").onclick=()=>{

sidebar.classList.toggle("open")

}

</script>

</body>
</html>
