<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Firebase Google Auth + Likes + Images</title>
<style>
  img { max-width: 200px; display: block; margin: 5px 0; }
  .post { border: 1px solid #ccc; padding: 5px; margin-bottom: 10px; }
</style>
</head>
<body>

<h2>Авторизация через Google</h2>
<button id="googleLogin">Войти через Google</button>
<button id="logout" style="display:none;">Выйти</button>

<hr>

<div id="postForm" style="display:none;">
  <input id="postText" placeholder="Введите сообщение">
  <input type="file" id="fileInput">
  <button id="addPost">Отправить</button>
</div>

<h3>Posts</h3>
<div id="posts"></div>
<p id="currentUser"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp,
  updateDoc, doc, increment 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
  authDomain: "zxc1234-668aa.firebaseapp.com",
  projectId: "zxc1234-668aa",
  storageBucket: "zxc1234-668aa.appspot.com",
  messagingSenderId: "587825633345",
  appId: "1:587825633345:web:2f098c987369bc934c0ec0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

// ===== Elements =====
const googleLoginBtn = document.getElementById("googleLogin");
const logoutBtn = document.getElementById("logout");
const postForm = document.getElementById("postForm");
const postText = document.getElementById("postText");
const fileInput = document.getElementById("fileInput");
const postsDiv = document.getElementById("posts");
const currentUserP = document.getElementById("currentUser");

// ===== Login / Logout =====
googleLoginBtn.onclick = async () => {
  try { await signInWithPopup(auth, provider); } 
  catch(e){ alert("Ошибка авторизации: " + e.message); console.error(e); }
};

logoutBtn.onclick = async () => {
  await signOut(auth);
};

// ===== Add Post =====
document.getElementById("addPost").onclick = async () => {
  if(!auth.currentUser) return alert("Сначала войдите через Google");
  if(!postText.value) return alert("Введите сообщение");

  let imageUrl = null;

  if(fileInput.files.length > 0){
    try {
      const file = fileInput.files[0];
      const storageRef = ref(storage, `images/${auth.currentUser.uid}/${Date.now()}_${file.name}`);
      const snapshot = await uploadBytes(storageRef, file);
      imageUrl = await getDownloadURL(snapshot.ref);
    } catch(e){
      alert("Ошибка при загрузке картинки: " + e.message);
      console.error(e);
      return;
    }
  }

  try {
    await addDoc(collection(db,"posts"), {
      text: postText.value,
      timestamp: serverTimestamp(),
      likes: 0,
      userId: auth.currentUser.uid,
      image: imageUrl
    });
    postText.value = "";
    fileInput.value = "";
  } catch(e){
    alert("Ошибка при добавлении поста: " + e.message);
    console.error(e);
  }
};

// ===== Real-time Posts =====
onAuthStateChanged(auth, (user) => {
  if(user){
    currentUserP.textContent = `Вошёл: ${user.displayName || user.email}`;
    postForm.style.display = "block";
    googleLoginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
  } else {
    currentUserP.textContent = `Не авторизован`;
    postForm.style.display = "none";
    googleLoginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
  }

  const q = query(collection(db,"posts"), orderBy("timestamp","desc"));
  onSnapshot(q, snap => {
    postsDiv.innerHTML = "";
    snap.forEach(d => {
      const data = d.data();
      const div = document.createElement("div");
      div.classList.add("post");
      div.innerHTML = `
        <p>${data.text}</p>
        ${data.image ? `<img src="${data.image}">` : ''}
        <p>👍 ${data.likes}</p>
        <button class="likeBtn">Like</button>
      `;
      div.querySelector(".likeBtn").onclick = async () => {
        await updateDoc(doc(db,"posts",d.id), { likes: increment(1) });
      };
      postsDiv.appendChild(div);
    });
  });
});
</script>
</body>
</html>
