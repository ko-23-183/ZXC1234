<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация Firebase</title>
</head>
<body>

<h2>Регистрация</h2>

<form id="registerForm">
  <input type="email" id="email" placeholder="Email" required><br><br>
  <input type="password" id="password" placeholder="Пароль" required><br><br>
  <button type="submit">Зарегистрироваться</button>
</form>

<p id="message"></p>

<script type="module">

  /* ==============================
     1. ИМПОРТ МОДУЛЕЙ (через CDN)
  ============================== */

  import { initializeApp } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import { getAuth, createUserWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


  /* ==============================
     2. ИНИЦИАЛИЗАЦИЯ FIREBASE
  ============================== */

  const firebaseConfig = {
    apiKey: "AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
    authDomain: "zxc1234-668aa.firebaseapp.com",
    projectId: "zxc1234-668aa",
    storageBucket: "zxc1234-668aa.firebasestorage.app",
    messagingSenderId: "587825633345",
    appId: "1:587825633345:web:2f098c987369bc934c0ec0",
    measurementId: "G-KSXSPNXJVP"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);


  /* ==============================
     3. ОБРАБОТКА ФОРМЫ
  ============================== */

  const form = document.getElementById("registerForm");
  const message = document.getElementById("message");

  form.addEventListener("submit", function(event) {
    event.preventDefault(); // отменяем перезагрузку страницы

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        message.style.color = "green";
        message.textContent = "Регистрация прошла успешно!";
      })
      .catch((error) => {
        message.style.color = "red";
        message.textContent = error.message;
      });
  });

</script>

</body>
</html>
