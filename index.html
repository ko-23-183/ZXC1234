<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Профиль</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 { margin-bottom: 10px; }

    button {
      width: 48%;
      padding: 10px;
      margin: 5px 1%;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .green { background: #28a745; color: white; }
    .yellow { background: #ffc107; }
    .blue { background: #17a2b8; color: white; }
    .gray { background: #6c757d; color: white; }
  </style>
</head>
<body>

<div class="card">
  <h2>Мой профиль</h2>
  <p id="name">Загрузка...</p>

  <button class="green" onclick="updateStatus('Учусь')">📚 Учусь</button>
  <button class="yellow" onclick="updateStatus('Кофе')">☕ Кофе</button>
  <button class="blue" onclick="updateStatus('В игре')">🎮 В игре</button>
  <button class="gray" onclick="updateStatus('Дома')">🏠 Дома</button>

  <p id="status"></p>
</div>

<script>
const supabaseUrl = 'https://omqqenqlalqzjsbjhqgz.supabase.co'; // твой реальный URL Supabase
const supabaseKey = 'sb_publishable_MMUvjysVPwIxm7N8oSvTuA_9_3GZWU9'; // твой ключ
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function loadProfile() {
  const { data, error } = await supabaseClient
    .from('profiles')
    .select('*')
    .limit(1)
    .single();

  if (error) {
    console.error(error);
    document.getElementById('name').innerText = "Ошибка загрузки профиля";
    return;
  }

  document.getElementById('name').innerText = "Вы зашли как: " + data.name;
  document.getElementById('status').innerText = "Статус: " + data.status;
}

async function updateStatus(newStatus) {
  const { error } = await supabaseClient
    .from('profiles')
    .update({ status: newStatus })
    .eq('id', 1); // убедись, что запись существует

  if (error) {
    console.error(error);
  } else {
    loadProfile();
  }
}

loadProfile();
</script>

</body>
</html>
