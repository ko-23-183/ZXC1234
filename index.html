<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Reactive Firebase App</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 400px;
  margin-top: 50px;
}

.post {
  background: #222;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

button {
  padding: 5px 10px;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container">

<h2>🔥 Реактивная лента</h2>

<input id="text" placeholder="Напиши пост">
<button onclick="addPost()">Отправить</button>

<div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  updateDoc,
  increment,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
  authDomain: "zxc1234-668aa.firebaseapp.com",
  projectId: "zxc1234-668aa",
  storageBucket: "zxc1234-668aa.firebasestorage.app",
  messagingSenderId: "587825633345",
  appId: "1:587825633345:web:2f098c987369bc934c0ec0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ Добавить пост
window.addPost = async function () {
  const text = document.getElementById("text").value;

  await addDoc(collection(db, "posts"), {
    text: text,
    likes: 0,
    timestamp: serverTimestamp()
  });

  document.getElementById("text").value = "";
};

// 🔥 Реактивное обновление (REAL TIME)
const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    feed.innerHTML += `
      <div class="post">
        <p>${data.text}</p>
        <button onclick="likePost('${docItem.id}', ${data.likes})">
          ❤️ ${data.likes}
        </button>
      </div>
    `;
  });
});

// 👍 Лайки (атомарное обновление)
window.likePost = async function(id) {
  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    likes: increment(1)
  });
};

</script>
</body>
</html>
