<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Reactive Firebase App</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 420px;
  margin-top: 50px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 8px 12px;
  cursor: pointer;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}

.post {
  background: #222;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.like {
  background: #ff3b5c;
  color: white;
}

.test {
  background: #00c6ff;
  color: black;
}
</style>
</head>

<body>
<div class="container">

<h2>🔥 Реактивная лента Firebase</h2>

<input id="text" placeholder="Напиши пост">
<button onclick="addPost()">Отправить пост</button>
<button class="test" onclick="testWrite()">Тест Firestore</button>

<div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  updateDoc,
  increment,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
  authDomain: "zxc1234-668aa.firebaseapp.com",
  projectId: "zxc1234-668aa",
  storageBucket: "zxc1234-668aa.firebasestorage.app",
  messagingSenderId: "587825633345",
  appId: "1:587825633345:web:2f098c987369bc934c0ec0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ Добавление поста
window.addPost = async function () {
  const text = document.getElementById("text").value;

  try {
    await addDoc(collection(db, "posts"), {
      text: text,
      likes: 0,
      timestamp: serverTimestamp()
    });

    document.getElementById("text").value = "";
  } catch (e) {
    console.error(e);
  }
};

// 🔥 ТЕСТ ЗАПИСИ В FIRESTORE
window.testWrite = async function () {
  try {
    await addDoc(collection(db, "test"), {
      text: "Hello Firestore",
      time: new Date().toISOString()
    });
    alert("Запись создана в Firestore (test)");
  } catch (e) {
    console.error("Firestore error:", e);
    alert("Ошибка записи. Проверь Rules или Firestore.");
  }
};

// 🔄 Реактивная лента
const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    feed.innerHTML += `
      <div class="post">
        <p>${data.text}</p>
        <button class="like" onclick="likePost('${docItem.id}')">
          ❤️ ${data.likes}
        </button>
      </div>
    `;
  });
});

// 👍 Лайки (атомарно)
window.likePost = async function(id) {
  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    likes: increment(1)
  });
};

</script>
</body>
</html>
