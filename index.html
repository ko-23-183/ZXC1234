<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация и Профиль</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      padding-top: 40px;
      flex-direction: column;
      align-items: center;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    input { width: 100%; padding: 8px; margin: 5px 0; }
    button { width: 48%; padding: 10px; margin: 5px 1%; border: none; border-radius: 5px; cursor: pointer; }
    .green { background: #28a745; color: white; }
    .blue { background: #17a2b8; color: white; }
    .gray { background: #6c757d; color: white; }
  </style>
</head>
<body>

<!-- Форма регистрации с именем -->
<div class="card" id="registerCard">
  <h2>Регистрация</h2>
  <input type="text" id="regName" placeholder="Имя">
  <input type="email" id="regEmail" placeholder="Email">
  <input type="password" id="regPassword" placeholder="Пароль">
  <button class="green" onclick="register()">Зарегистрироваться</button>
</div>

<!-- Форма логина -->
<div class="card" id="loginCard">
  <h2>Логин</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Пароль">
  <button class="blue" onclick="login()">Войти</button>
</div>

<!-- Профиль -->
<div class="card" id="profileCard" style="display:none;">
  <h2>Мой профиль</h2>
  <p id="name">Загрузка...</p>
  <button class="green" onclick="updateStatus('Учусь')">📚 Учусь</button>
  <button class="gray" onclick="updateStatus('Дома')">🏠 Дома</button>
  <p id="status"></p>
  <button class="blue" onclick="logout()">Выйти</button>
</div>

<script>
  const supabaseUrl = 'https://omqqenqlalqzjsbjhqgz.supabase.co';
  const supabaseKey = 'sb_publishable_MMUvjysVPwIxm7N8oSvTuA_9_3GZWU9';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // Регистрация с именем
  async function register() {
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;

    // создаем пользователя
    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
    if (signUpError) {
      alert('Ошибка регистрации: ' + signUpError.message);
      return;
    }

    // создаем профиль с именем
    const userId = signUpData.user.id;
    const { error: profileError } = await supabase.from('profiles').insert([
      { id: userId, name: name, status: "Не установлен" }
    ]);

    if (profileError) {
      alert('Ошибка создания профиля: ' + profileError.message);
      return;
    }

    alert('Регистрация успешна! Вы вошли автоматически.');
    showProfile();
  }

  // Логин
  async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      alert('Ошибка входа: ' + error.message);
      return;
    }

    showProfile();
  }

  // Показ профиля
  async function showProfile() {
    const userRes = await supabase.auth.getUser();
    const user = userRes.data.user;
    if (!user) return;

    const { data, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();

    if (error) {
      document.getElementById('name').innerText = "Профиль не найден";
      document.getElementById('status').innerText = "";
    } else {
      document.getElementById('name').innerText = "Вы: " + data.name;
      document.getElementById('status').innerText = "Статус: " + data.status;
    }

    // Скрываем формы регистрации и логина, показываем профиль
    document.getElementById('registerCard').style.display = 'none';
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('profileCard').style.display = 'block';
  }

  // Обновление статуса
  async function updateStatus(newStatus) {
    const userRes = await supabase.auth.getUser();
    const user = userRes.data.user;
    if (!user) return;

    const { error } = await supabase
      .from('profiles')
      .update({ status: newStatus })
      .eq('id', user.id);

    if (!error) showProfile();
  }

  // Выход
  async function logout() {
    await supabase.auth.signOut();
    document.getElementById('profileCard').style.display = 'none';
    document.getElementById('registerCard').style.display = 'block';
    document.getElementById('loginCard').style.display = 'block';
  }
</script>

</body>
</html>
