<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Firebase Auth</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <style>
    body { font-family: Arial; background:#f5f5f5; display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { background:white; padding:20px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:300px; }
    input, button { width:100%; padding:10px; margin:8px 0; }
    button { cursor:pointer; }
  </style>
</head>
<body>

<div class="box">
  <h2>Регистрация</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Пароль">
  <button onclick="register()">Зарегистрироваться</button>

  <h2>Вход</h2>
  <button onclick="login()">Войти</button>

  <h3 id="status"></h3>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
    authDomain: "zxc1234-668aa.firebaseapp.com",
    projectId: "zxc1234-668aa",
    storageBucket: "zxc1234-668aa.firebasestorage.app",
    messagingSenderId: "587825633345",
    appId: "1:587825633345:web:2f098c987369bc934c0ec0",
    measurementId: "G-KSXSPNXJVP"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.register = function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        document.getElementById('status').innerText = "Регистрация успешна";
      })
      .catch((error) => {
        document.getElementById('status').innerText = error.message;
      });
  }

  window.login = function() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        document.getElementById('status').innerText = "Вход выполнен";
      })
      .catch((error) => {
        document.getElementById('status').innerText = error.message;
      });
  }
</script>

</body>
</html>
