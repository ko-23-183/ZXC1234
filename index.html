<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZXC Chat</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel:rgba(255,255,255,.06);
      --panel2:rgba(255,255,255,.08);
      --stroke:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.60);
      --accent:#7c5cff;
      --accent2:#2dd4bf;
      --me:linear-gradient(135deg,var(--accent),var(--accent2));
      --other:rgba(255,255,255,.10);
      --shadow:0 20px 60px rgba(0,0,0,.45);
      --shadow2:0 12px 35px rgba(0,0,0,.35);
      --radius2:14px;
      --gap:14px;
      --font:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans";
    }

    body.theme-dark{
      --bg:#0b1220; --panel:rgba(255,255,255,.06); --panel2:rgba(255,255,255,.08); --stroke:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.60); --accent:#7c5cff; --accent2:#2dd4bf; --other:rgba(255,255,255,.10);
      --shadow:0 20px 60px rgba(0,0,0,.45); --shadow2:0 12px 35px rgba(0,0,0,.35);
    }
    body.theme-light{
      --bg:#f4f6fb; --panel:#fff; --panel2:#f1f3f8; --stroke:#e6e8ee;
      --text:#0f172a; --muted:rgba(15,23,42,.60); --accent:#6366f1; --accent2:#22c55e; --other:#e9ecf3;
      --shadow:0 18px 55px rgba(15,23,42,.12); --shadow2:0 10px 28px rgba(15,23,42,.10);
    }
    body.theme-masha{
      --bg:#fff0f6; --panel:#ffd6e7; --panel2:#ffc2da; --stroke:#ff9ac8;
      --text:#5b0042; --muted:rgba(91,0,66,.65); --accent:#ff3e9e; --accent2:#ff78b3; --other:#ffb7d3;
      --shadow:0 18px 55px rgba(255,0,120,.20); --shadow2:0 10px 28px rgba(255,0,120,.16);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      background:
        radial-gradient(1200px 800px at 15% 10%, rgba(124,92,255,.18), transparent 60%),
        radial-gradient(900px 700px at 85% 25%, rgba(45,212,191,.14), transparent 55%),
        var(--bg);
      color:var(--text);
      height:100dvh;
      overflow:hidden;
    }

    .app{
      width:100%;
      height:100%;
      min-height:0;
      display:grid;
      grid-template-columns:320px 1fr;
    }

    .sidebar{
      border-right:1px solid var(--stroke);
      background:var(--panel);
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      padding:18px;
      gap:var(--gap);
      overflow:hidden;
    }

    .brand{display:flex; align-items:center; justify-content:space-between; gap:10px}
    .brand h1{font-size:16px; margin:0; font-weight:900}
    .sub{font-size:12px; color:var(--muted); margin-top:3px}

    .pill-group{
      display:flex; gap:8px; padding:6px;
      border-radius:999px; background:var(--panel2); border:1px solid var(--stroke);
    }
    .pill{
      border:0; background:transparent; color:var(--text);
      padding:8px 10px; border-radius:999px; cursor:pointer;
      font-weight:900; font-size:12px;
    }
    .pill.active{background:rgba(255,255,255,.10); box-shadow:0 8px 18px rgba(0,0,0,.18)}

    .auth-row{display:flex; gap:10px; flex-wrap:wrap}
    .btn{
      border:0; cursor:pointer; font-weight:900; border-radius:12px;
      padding:10px 12px; color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:var(--shadow2);
      transition:transform .12s ease, opacity .12s ease;
      white-space:nowrap;
    }
    .btn:hover{transform:translateY(-2px)}
    .btn:active{transform:translateY(0); opacity:.92}
    .btn.ghost{background:transparent; color:var(--text); border:1px solid var(--stroke); box-shadow:none}

    .users-head .label{
      font-weight:900; font-size:12px; letter-spacing:.3px;
      color:var(--muted); text-transform:uppercase;
      margin-top:4px;
    }

    .users{
      flex:1; min-height:0;
      overflow:auto; padding-right:6px;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
    }

    .user{
      display:flex; gap:10px; align-items:center;
      padding:10px; margin-bottom:10px;
      border:1px solid var(--stroke);
      border-radius:var(--radius2);
      background:var(--panel2);
      cursor:pointer;
    }

    .dot{
      width:10px; height:10px;
      border-radius:999px;
      background:#ff2d55;
      box-shadow: 0 0 0 3px rgba(255,45,85,.18);
      flex:0 0 10px;
      display:none;
    }
    .dot.on{ display:block; }

    .avatar{
      width:34px; height:34px; border-radius:12px;
      border:1px solid var(--stroke);
      display:grid; place-items:center;
      font-weight:900;
      background:linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
      overflow:hidden;
      flex:0 0 34px;
    }
    .avatar img{width:100%; height:100%; object-fit:cover; display:block}
    .meta{min-width:0; display:flex; flex-direction:column}
    .name{font-weight:900; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .email{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

    .chat{
      display:flex; flex-direction:column;
      height:100%; min-height:0; min-width:0;
    }

    .chat-header{
      flex:0 0 auto;
      height:64px; padding:14px 16px;
      border-bottom:1px solid var(--stroke);
      background:var(--panel);
      backdrop-filter:blur(18px);
      display:flex; align-items:center; gap:12px;
    }
    .mobile-menu{
      display:none;
      border:1px solid var(--stroke);
      background:var(--panel2);
      color:var(--text);
      border-radius:12px;
      width:40px; height:40px;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(0,0,0,.18);
    }
    .chat-title{display:flex; flex-direction:column; min-width:0}
    .chat-title .top{font-weight:950; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .chat-title .bottom{font-size:12px; color:var(--muted); margin-top:2px}

    .messages{
      flex:1;
      min-height:0;
      overflow-y:auto;
      overflow-x:hidden;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
    
      align-items:flex-start; /* не растягивать пузырь на всю ширину */
    }
    
    .bubble{
      display:inline-block;   /* ✅ вместо fit-content */
      max-width:78%;
      border-radius:18px;
      padding:10px 12px;
      border:1px solid var(--stroke);
      background:var(--other);
      backdrop-filter:blur(12px);
      box-shadow:0 10px 28px rgba(0,0,0,.18);
      overflow:hidden;
      min-width: 44px;
    }
    
    .bubble.me{
      align-self:flex-end;
      background:var(--me);
      color:#fff;
      border-color:rgba(255,255,255,.10);
      box-shadow:0 12px 32px rgba(0,0,0,.22);
    }
    
    .text{
      font-size:14px;
      line-height:1.35;
      white-space:pre-wrap;
      overflow-wrap:break-word; /* ✅ вместо anywhere */
      word-break:break-word;
    }
    .time{margin-top:6px; font-size:11px; opacity:.75; text-align:right}

    /* FIX: images never overflow / never create horizontal scroll */
      .bubble img{
      display:block;
      width:100%;
      max-width:420px;
      height:auto;
      max-height:min(55vh, 520px);
      object-fit:contain;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      margin-top:8px;
    }

    .composer{
      flex:0 0 auto;
      padding:14px 16px;
      border-top:1px solid var(--stroke);
      background:var(--panel);
      backdrop-filter:blur(18px);
      display:none;
      gap:10px;
      align-items:center;
      padding-bottom:calc(14px + env(safe-area-inset-bottom));
    }

    .field{
      flex:1;
      display:flex; gap:10px; align-items:center;
      padding:10px 12px;
      border-radius:14px;
      background:var(--panel2);
      border:1px solid var(--stroke);
      box-shadow:0 10px 26px rgba(0,0,0,.14);
    }
    .input{
      flex:1; min-width:0;
      border:0; outline:none;
      background:transparent;
      color:var(--text);
      font-size:14px;
    }
    .file{display:none}
    .icon-btn{
      width:42px; height:42px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.08);
      color:var(--text);
      cursor:pointer;
      display:grid; place-items:center;
      user-select:none;
    }
    .send-btn{
      width:46px; height:46px;
      border-radius:16px;
      border:0; cursor:pointer;
      color:#fff; font-weight:900;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:var(--shadow2);
      user-select:none;
    }
    .send-btn[disabled], .icon-btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none !important;
    }

    .emoji-panel{
      display:none;
      gap:8px;
      flex-wrap:wrap;
      padding:10px 16px;
      border-top:1px solid var(--stroke);
      background:var(--panel);
      backdrop-filter:blur(18px);
    }
    .emoji-panel.show{ display:flex; }
    .emoji{
      width:38px; height:38px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.08);
      cursor:pointer;
      display:grid; place-items:center;
      font-size:18px;
      user-select:none;
    }

    .overlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,.40);
      backdrop-filter:blur(2px);
      z-index:10;
      display:none;
    }
    .overlay.show{display:block}

    @media (max-width: 920px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:fixed; top:0; left:0; bottom:0;
        width:min(360px,86vw);
        transform:translateX(-110%);
        transition:transform .18s ease;
        z-index:20;
      }
      .sidebar.open{transform:translateX(0%)}
      .mobile-menu{display:grid; place-items:center}
      .bubble{max-width:92%}
      .bubble img{max-width:100%} /* mobile full width */
    }
  </style>
</head>

<body class="theme-dark">
  <div class="overlay" id="overlay"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div>
          <h1>ZXC Chat</h1>
          <div class="sub" id="authHint">Войдите, чтобы начать</div>
        </div>
        <div class="pill-group" title="Тема">
          <button class="pill" id="tDark" type="button">🌙</button>
          <button class="pill" id="tLight" type="button">☀️</button>
          <button class="pill" id="tMasha" type="button">🌸</button>
        </div>
      </div>

      <div class="auth-row">
        <button class="btn" id="googleLogin" type="button">Google</button>
        <button class="btn ghost" id="logout" type="button" style="display:none;">Выйти</button>
      </div>

      <div class="users-head"><div class="label">Пользователи</div></div>
      <div class="users" id="users"></div>
    </aside>

    <main class="chat">
      <header class="chat-header">
        <button class="mobile-menu" id="menuBtn" type="button" aria-label="Меню">☰</button>
        <div class="chat-title">
          <div class="top" id="chatName">Выберите пользователя</div>
          <div class="bottom" id="chatSub">Чат появится здесь</div>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <div class="emoji-panel" id="emojiPanel"></div>

      <footer class="composer" id="sendForm">
        <div class="field">
          <button class="icon-btn" id="emojiBtn" type="button" title="Смайлики">🙂</button>
          <input class="input" id="messageText" type="text" placeholder="Введите сообщение…" autocomplete="off" />
          <input class="file" id="messageFile" type="file" accept="image/*" />
          <button class="icon-btn" id="attachBtn" type="button" title="Прикрепить">📎</button>
        </div>
        <button class="send-btn" id="sendMessage" type="button" title="Отправить">➤</button>
      </footer>
    </main>
  </div>

  <!-- Put message.mp3 next to index.html -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      setPersistence,
      browserLocalPersistence,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      doc,
      setDoc,
      serverTimestamp,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ===== Firebase config =====
    const firebaseConfig = {
      apiKey: "AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
      authDomain: "zxc1234-668aa.firebaseapp.com",
      projectId: "zxc1234-668aa",
      storageBucket: "zxc1234-668aa.appspot.com",
      messagingSenderId: "587825633345",
      appId: "1:587825633345:web:2f098c987369bc934c0ec0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    try { await setPersistence(auth, browserLocalPersistence); }
    catch (e) { console.warn("setPersistence failed:", e); }

    const googleProvider = new GoogleAuthProvider();

    // ===== DOM =====
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const menuBtn = document.getElementById("menuBtn");

    const authHint = document.getElementById("authHint");
    const googleLoginBtn = document.getElementById("googleLogin");
    const logoutBtn = document.getElementById("logout");

    const usersDiv = document.getElementById("users");
    const chatNameEl = document.getElementById("chatName");
    const chatSubEl = document.getElementById("chatSub");

    const messagesDiv = document.getElementById("messages");
    const sendForm = document.getElementById("sendForm");

    const emojiPanel = document.getElementById("emojiPanel");
    const emojiBtn = document.getElementById("emojiBtn");

    const messageText = document.getElementById("messageText");
    const messageFile = document.getElementById("messageFile");
    const attachBtn = document.getElementById("attachBtn");
    const sendMessageBtn = document.getElementById("sendMessage");

    const tDark = document.getElementById("tDark");
    const tLight = document.getElementById("tLight");
    const tMasha = document.getElementById("tMasha");

    // ===== State =====
    let currentUser = null;
    let currentChatId = null;
    let usersUnsub = null;
    let messagesUnsub = null;
    let unreadUnsub = null;

    // unread map: otherUid -> true/false
    const unread = new Map();

    // Track last seen message id (for sound)
    let lastMessageId = null;

    // ===== Sound =====
    const msgSound = new Audio("message.mp3");
    msgSound.volume = 0.6;

    let audioUnlocked = false;
    async function unlockAudioOnce(){
      if (audioUnlocked) return;
      audioUnlocked = true;
      try{
        const prev = msgSound.volume;
        msgSound.volume = 0.001;
        await msgSound.play();
        msgSound.pause();
        msgSound.currentTime = 0;
        msgSound.volume = prev;
      }catch(e){}
    }
    document.addEventListener("touchstart", unlockAudioOnce, { once: true });
    document.addEventListener("click", unlockAudioOnce, { once: true });

    async function playMsgSound(){
      try{
        msgSound.currentTime = 0;
        await msgSound.play();
      }catch(e){}
    }

    // ===== Sending lock (anti-spam click) =====
    let sending = false;
    function setSending(v){
      sending = v;
      sendMessageBtn.disabled = v;
      attachBtn.disabled = v;
      emojiBtn.disabled = v;
      messageText.disabled = v;
    }

    // ===== Helpers =====
    function setTheme(theme){
      document.body.classList.remove("theme-dark","theme-light","theme-masha");
      document.body.classList.add(theme);
      localStorage.setItem("theme", theme);
      [tDark,tLight,tMasha].forEach(b=>b.classList.remove("active"));
      if(theme==="theme-dark") tDark.classList.add("active");
      if(theme==="theme-light") tLight.classList.add("active");
      if(theme==="theme-masha") tMasha.classList.add("active");
    }
    setTheme(localStorage.getItem("theme") || "theme-dark");
    tDark.onclick = () => setTheme("theme-dark");
    tLight.onclick = () => setTheme("theme-light");
    tMasha.onclick = () => setTheme("theme-masha");

    function closeSidebar(){ sidebar.classList.remove("open"); overlay.classList.remove("show"); }
    function openSidebar(){ sidebar.classList.add("open"); overlay.classList.add("show"); }
    menuBtn.onclick = () => sidebar.classList.contains("open") ? closeSidebar() : openSidebar();
    overlay.onclick = closeSidebar;

    function initials(s){
      s = (s || "").trim(); if(!s) return "?";
      const p = s.split(/\s+/).filter(Boolean);
      return ((p[0]?.[0]||"?") + (p[1]?.[0]||"")).toUpperCase();
    }
    function formatTime(ts){
      const d = ts?.toDate ? ts.toDate() : null;
      return d ? d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}) : "";
    }

    // ===== Emoji panel =====
    const EMOJIS = ["😀","😁","😂","🤣","😊","😍","😘","😎","🤝","👍","🙏","🔥","❤️","💔","🎉","💯","🤡","😡","😭","🥲","😴","🤔","😅","😉","🤍","🖤","🌸"];
    function renderEmojis(){
      emojiPanel.innerHTML = "";
      EMOJIS.forEach(e => {
        const b = document.createElement("button");
        b.className = "emoji";
        b.type = "button";
        b.textContent = e;
        b.onclick = () => {
          messageText.value += e;
          messageText.focus();
        };
        emojiPanel.appendChild(b);
      });
    }
    renderEmojis();

    emojiBtn.onclick = () => {
      emojiPanel.classList.toggle("show");
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    };

    // ===== Auth =====
    googleLoginBtn.onclick = async () => {
      try {
        await unlockAudioOnce();
        await signInWithPopup(auth, googleProvider);
      } catch(e){
        console.error(e);
        alert("Google error: " + (e?.message||e));
      }
    };

    logoutBtn.onclick = async () => {
      try { await signOut(auth); }
      catch(e){ console.error(e); alert("Logout error: " + (e?.message||e)); }
    };

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;

      if(usersUnsub){ usersUnsub(); usersUnsub=null; }
      if(messagesUnsub){ messagesUnsub(); messagesUnsub=null; }
      if(unreadUnsub){ unreadUnsub(); unreadUnsub=null; }

      currentChatId = null;
      lastMessageId = null;

      usersDiv.innerHTML = "";
      messagesDiv.innerHTML = "";
      chatNameEl.textContent = "Выберите пользователя";
      chatSubEl.textContent = "Чат появится здесь";
      emojiPanel.classList.remove("show");

      if(!user){
        googleLoginBtn.style.display = "inline-flex";
        logoutBtn.style.display = "none";
        sendForm.style.display = "none";
        authHint.textContent = "Войдите, чтобы начать";
        return;
      }

      googleLoginBtn.style.display = "none";
      logoutBtn.style.display = "inline-flex";
      sendForm.style.display = "flex";
      authHint.textContent = user.displayName ? `Вы вошли как ${user.displayName}` : "Вы вошли";

      try{
        await setDoc(doc(db, "users", user.uid), {
          name: user.displayName || "",
          email: user.email || "",
          photoURL: user.photoURL || "",
          updatedAt: serverTimestamp()
        }, { merge: true });
      }catch(e){
        console.error(e);
        alert("Firestore users write denied: " + (e?.message || e));
      }

      subscribeUsers();
      subscribeUnreadDots();
    });

    // ===== Users list =====
    function subscribeUsers(){
      usersUnsub = onSnapshot(collection(db,"users"), (snap) => {
        usersDiv.innerHTML = "";
        let count = 0;

        snap.forEach((d) => {
          if(d.id === currentUser.uid) return;

          const data = d.data() || {};
          const otherUid = d.id;
          const name = data.name || data.email || "Пользователь";
          const email = data.email || "";

          const item = document.createElement("div");
          item.className = "user";

          const dot = document.createElement("div");
          dot.className = "dot" + (unread.get(otherUid) ? " on" : "");

          const av = document.createElement("div");
          av.className = "avatar";
          if(data.photoURL){
            const img = document.createElement("img");
            img.src = data.photoURL;
            img.alt = name;
            av.appendChild(img);
          }else{
            av.textContent = initials(name);
          }

          const meta = document.createElement("div");
          meta.className = "meta";

          const nm = document.createElement("div");
          nm.className = "name";
          nm.textContent = name;

          const em = document.createElement("div");
          em.className = "email";
          em.textContent = email;

          meta.appendChild(nm);
          meta.appendChild(em);

          item.appendChild(dot);
          item.appendChild(av);
          item.appendChild(meta);

          item.onclick = () => openChat(otherUid, name);

          usersDiv.appendChild(item);
          count++;
        });

        if(count === 0){
          const empty = document.createElement("div");
          empty.style.color = "var(--muted)";
          empty.style.fontSize = "13px";
          empty.style.padding = "10px";
          empty.textContent = "Пока нет других пользователей. Зайди с другого аккаунта для теста.";
          usersDiv.appendChild(empty);
        }
      });
    }

    // ===== Unread dots (read receipts) =====
    function tsToMillis(ts){
      try { return ts?.toMillis ? ts.toMillis() : 0; } catch(_) { return 0; }
    }

    function subscribeUnreadDots(){
      unreadUnsub = onSnapshot(collection(db,"chats"), (snap) => {
        if(!currentUser) return;

        let changed = false;

        snap.forEach((d) => {
          const chat = d.data() || {};
          if(!Array.isArray(chat.users) || !chat.users.includes(currentUser.uid)) return;

          const otherUid = chat.users.find(u => u !== currentUser.uid);
          if(!otherUid) return;

          // ignore currently opened chat
          if(currentChatId && d.id === currentChatId) return;

          const lastSender = chat.lastSenderId || null;
          const lastAt = chat.lastMessageAt || chat.updatedAt || null;
          const readAt = chat.readBy ? chat.readBy[currentUser.uid] : null;

          const isFromOther = lastSender && lastSender !== currentUser.uid;
          const isUnread = isFromOther && tsToMillis(lastAt) > tsToMillis(readAt);

          if(unread.get(otherUid) !== isUnread){
            unread.set(otherUid, isUnread);
            changed = true;
          }
        });

        if(changed) subscribeUsers();
      });
    }

    // ===== Open chat =====
    function openChat(otherUid, otherName){
      closeSidebar();

      messagesDiv.innerHTML = "";
      chatNameEl.textContent = otherName;
      chatSubEl.textContent = "Сообщения в реальном времени";
      emojiPanel.classList.remove("show");

      currentChatId = [currentUser.uid, otherUid].sort().join("_");
      lastMessageId = null;

      const chatRef = doc(db,"chats",currentChatId);

      setDoc(chatRef, {
        users: [currentUser.uid, otherUid],
        updatedAt: serverTimestamp(),
        readBy: { [currentUser.uid]: serverTimestamp() }
      }, { merge:true });

      const messagesRef = collection(chatRef,"messages");
      if(messagesUnsub) messagesUnsub();

      messagesUnsub = onSnapshot(query(messagesRef, orderBy("timestamp")), async (snap) => {
        messagesDiv.innerHTML = "";

        snap.forEach((d) => {
          const data = d.data() || {};
          const b = document.createElement("div");
          b.className = "bubble " + (data.senderId === currentUser.uid ? "me" : "other");

          if(data.text){
            const t = document.createElement("div");
            t.className = "text";
            t.textContent = data.text;
            b.appendChild(t);
          }

          if(data.imageBase64){
            const img = document.createElement("img");
            img.src = data.imageBase64;
            img.alt = "image";
            b.appendChild(img);
          }

          const tm = document.createElement("div");
          tm.className = "time";
          tm.textContent = formatTime(data.timestamp);
          b.appendChild(tm);

          messagesDiv.appendChild(b);
        });

        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        // SOUND only for new incoming message
        const lastDoc = snap.docs[snap.docs.length - 1];
        if(lastDoc){
          const data = lastDoc.data() || {};
          const isNew = lastDoc.id !== lastMessageId;
          if(isNew && data.senderId && data.senderId !== currentUser.uid){
            playMsgSound();
          }
          lastMessageId = lastDoc.id;
        }

        // mark as read (immediately) and clear dot
        try{
          await updateDoc(chatRef, {
            [`readBy.${currentUser.uid}`]: serverTimestamp()
          });

          if(unread.get(otherUid) !== false){
            unread.set(otherUid, false);
            subscribeUsers();
          }
        }catch(e){}
      });
    }

    // ===== Send message (anti multiple clicks) =====
    attachBtn.onclick = () => messageFile.click();

    messageText.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        sendMessageBtn.click();
      }
    });

    sendMessageBtn.onclick = async () => {
      if(sending) return;
      if(!currentChatId) return alert("Выберите пользователя слева");

      const text = (messageText.value || "").trim();
      const hasFile = messageFile.files && messageFile.files.length > 0;
      if(!text && !hasFile) return;

      setSending(true);

      try{
        if(hasFile){
          const file = messageFile.files[0];
          const r = new FileReader();
          r.onload = async () => {
            try{
              await sendMessage(text, r.result);
              messageText.value = "";
              messageFile.value = "";
              messageText.focus();
            } finally {
              setSending(false);
            }
          };
          r.readAsDataURL(file);
        } else {
          await sendMessage(text, null);
          messageText.value = "";
          messageFile.value = "";
          messageText.focus();
          setSending(false);
        }
      }catch(e){
        setSending(false);
        console.error(e);
        alert("Send error: " + (e?.message || e));
      }
    };

    async function sendMessage(text, imageBase64){
      const chatRef = doc(db,"chats",currentChatId);
      const messagesRef = collection(chatRef,"messages");

      await addDoc(messagesRef, {
        senderId: currentUser.uid,
        text: text || "",
        imageBase64: imageBase64 || null,
        timestamp: serverTimestamp()
      });

      await updateDoc(chatRef, {
        lastMessage: text ? text : (imageBase64 ? "📷 Картинка" : ""),
        lastSenderId: currentUser.uid,
        lastMessageAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
        [`readBy.${currentUser.uid}`]: serverTimestamp()
      });
    }
  </script>
</body>
</html>
