<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Firebase Google Auth + Likes + Images</title>
</head>
<body>

<h2>Авторизация через Google</h2>
<button type="button" id="googleLogin">Войти через Google</button>
<button type="button" id="logout" style="display:none;">Выйти</button>

<hr>

<div id="postForm" style="display:none;">
  <input id="postText" placeholder="Введите сообщение">
  <input type="file" id="fileInput">
  <button type="button" id="addPost">Отправить</button>
</div>

<h3>Posts</h3>
<div id="posts"></div>
<p id="currentUser"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
  authDomain: "zxc1234-668aa.firebaseapp.com",
  projectId: "zxc1234-668aa",
  storageBucket: "zxc1234-668aa.appspot.com",
  messagingSenderId: "587825633345",
  appId: "1:587825633345:web:2f098c987369bc934c0ec0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const googleProvider = new GoogleAuthProvider();

const googleLoginBtn = document.getElementById("googleLogin");
const logoutBtn = document.getElementById("logout");
const postForm = document.getElementById("postForm");
const postText = document.getElementById("postText");
const fileInput = document.getElementById("fileInput");
const postsDiv = document.getElementById("posts");
const currentUserP = document.getElementById("currentUser");

// ===== LOGIN GOOGLE =====
googleLoginBtn.onclick = async () => {
  try { await signInWithPopup(auth, googleProvider); } 
  catch(e){ alert("Ошибка авторизации: " + e.message); }
};

// ===== LOGOUT =====
logoutBtn.onclick = async () => { await signOut(auth); };

// ===== ADD POST =====
document.getElementById("addPost").onclick = async () => {
  if(!auth.currentUser) return alert("Сначала войдите через Google");
  if(!postText.value) return alert("Введите сообщение");

  let imageUrl = null;
  if(fileInput.files.length > 0){
    const file = fileInput.files[0];
    const storageRef = ref(storage, `images/${auth.currentUser.uid}/${Date.now()}_${file.name}`);
    await uploadBytes(storageRef, file);
    imageUrl = await getDownloadURL(storageRef);
  }

  try {
    await addDoc(collection(db,"posts"),{
      text: postText.value,
      timestamp: serverTimestamp(),
      likes: 0,
      userId: auth.currentUser.uid,
      image: imageUrl
    });
    postText.value = "";
    fileInput.value = "";
  } catch(e){
    alert("Ошибка при отправке: " + e.message);
  }
};

// ===== REAL-TIME POSTS & UI =====
onAuthStateChanged(auth, (user) => {
  if(user){
    currentUserP.textContent = `Вошёл: ${user.displayName || user.email}`;
    postForm.style.display = "block";
    googleLoginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
  } else {
    currentUserP.textContent = `Не авторизован`;
    postForm.style.display = "none";
    googleLoginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
  }

  const q = query(collection(db,"posts"), orderBy("timestamp","desc"));
  onSnapshot(q, snap => {
    postsDiv.innerHTML = "";
    snap.forEach(d => {
      const data = d.data();
      const div = document.createElement("div");
      div.innerHTML = `
        <p>${data.text}</p>
        ${data.image ? `<img src="${data.image}" width="200">` : ''}
        <p>👍 ${data.likes}</p>
        <button class="likeBtn">Like</button>
      `;
      div.querySelector(".likeBtn").onclick = async () => {
        await updateDoc(doc(db,"posts",d.id), { likes: increment(1) });
      };
      postsDiv.appendChild(div);
    });
  });
});
</script>
</body>
</html>
