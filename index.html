<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Firebase Realtime App</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
}

.container{
    width:400px;
    background:white;
    padding:20px;
    margin-top:40px;
    border-radius:10px;
}

input,button{
    width:100%;
    padding:10px;
    margin:5px 0;
}

.post{
    border:1px solid #ddd;
    padding:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Регистрация</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">

<button id="register">Регистрация</button>
<button id="login">Вход</button>

<hr>

<h3>Создать сообщение</h3>

<input id="postText" placeholder="Текст сообщения">
<button id="addPost">Отправить</button>

<hr>

<h3>Лента (Realtime)</h3>
<div id="posts"></div>

</div>

<script type="module">

/* ================= FIREBASE IMPORT ================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
doc,
setDoc,
onSnapshot,
query,
orderBy,
updateDoc,
increment,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ================= CONFIG ================= */

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= REGISTER ================= */

document.getElementById("register").onclick = async () => {

const email = emailInput.value;
const password = passwordInput.value;

const cred =
await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",cred.user.uid),{
email:cred.user.email,
createdAt:serverTimestamp()
});

alert("Регистрация успешна");
};

/* ================= LOGIN ================= */

document.getElementById("login").onclick = async () => {

await signInWithEmailAndPassword(
auth,
emailInput.value,
passwordInput.value
);

alert("Вход выполнен");
};

/* ================= ADD POST ================= */

document.getElementById("addPost").onclick = async ()=>{

if(!auth.currentUser) return alert("Сначала войдите");

await addDoc(collection(db,"posts"),{
text:postText.value,
likes:0,
uid:auth.currentUser.uid,
timestamp:serverTimestamp()
});

postText.value="";
};

/* ================= REALTIME FEED ================= */

const postsDiv=document.getElementById("posts");

onAuthStateChanged(auth,(user)=>{

if(!user) return;

const q=query(
collection(db,"posts"),
orderBy("timestamp","desc")
);

onSnapshot(q,(snapshot)=>{

postsDiv.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();

const div=document.createElement("div");
div.className="post";

div.innerHTML=`
<p>${data.text}</p>
<p>👍 ${data.likes}</p>
<button data-id="${docSnap.id}">
Like
</button>
`;

div.querySelector("button").onclick=async()=>{

await updateDoc(
doc(db,"posts",docSnap.id),
{likes:increment(1)}
);

};

postsDiv.appendChild(div);

});

});

});

</script>
</body>
</html>
