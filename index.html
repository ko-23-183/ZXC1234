<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZXC Chat</title>

  <style>
    /* =========================
       Premium UI + 3 themes
       ========================= */
    :root{
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.08);
      --stroke: rgba(255,255,255,.10);

      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.60);

      --accent: #7c5cff;
      --accent2: #2dd4bf;

      --me: linear-gradient(135deg, var(--accent), var(--accent2));
      --other: rgba(255,255,255,.10);

      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --shadow2: 0 12px 35px rgba(0,0,0,.35);
      --radius: 18px;
      --radius2: 14px;
      --gap: 14px;

      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans";
    }

    body.theme-dark{
      --bg:#0b1220;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.08);
      --stroke: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.60);
      --accent:#7c5cff;
      --accent2:#2dd4bf;
      --other: rgba(255,255,255,.10);
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --shadow2: 0 12px 35px rgba(0,0,0,.35);
    }

    body.theme-light{
      --bg:#f4f6fb;
      --panel:#ffffff;
      --panel2:#f1f3f8;
      --stroke:#e6e8ee;
      --text:#0f172a;
      --muted: rgba(15,23,42,.60);
      --accent:#6366f1;
      --accent2:#22c55e;
      --other:#e9ecf3;
      --shadow: 0 18px 55px rgba(15,23,42,.12);
      --shadow2: 0 10px 28px rgba(15,23,42,.10);
    }

    body.theme-masha{
      --bg:#fff0f6;
      --panel:#ffd6e7;
      --panel2:#ffc2da;
      --stroke:#ff9ac8;
      --text:#5b0042;
      --muted: rgba(91,0,66,.65);
      --accent:#ff3e9e;
      --accent2:#ff78b3;
      --other:#ffb7d3;
      --shadow: 0 18px 55px rgba(255,0,120,.20);
      --shadow2: 0 10px 28px rgba(255,0,120,.16);
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }
    body{
      margin: 0;
      font-family: var(--font);
      background: radial-gradient(1200px 800px at 15% 10%, rgba(124,92,255,.18), transparent 60%),
                  radial-gradient(900px 700px at 85% 25%, rgba(45,212,191,.14), transparent 55%),
                  var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Layout */
    .app{
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    .sidebar{
      border-right: 1px solid var(--stroke);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: var(--gap);
      overflow: hidden;
    }

    .brand{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .brand .title{
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }
    .brand h1{
      font-size: 16px;
      margin: 0;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .brand .sub{
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .auth-row{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn{
      border: 0;
      cursor: pointer;
      font-weight: 800;
      border-radius: 12px;
      padding: 10px 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: var(--shadow2);
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select: none;
      white-space: nowrap;
    }
    .btn:hover{ transform: translateY(-2px); }
    .btn:active{ transform: translateY(0px); opacity: .92; }
    .btn.ghost{
      background: transparent;
      color: var(--text);
      border: 1px solid var(--stroke);
      box-shadow: none;
    }
    .btn.apple{
      background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      color: var(--text);
      border: 1px solid var(--stroke);
    }

    .pill-group{
      display: flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: var(--panel2);
      border: 1px solid var(--stroke);
    }
    .pill{
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 8px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
    }
    .pill:hover{ transform: translateY(-1px); }
    .pill.active{
      background: rgba(255,255,255,.10);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
    }

    .users-head{
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      gap: 10px;
    }
    .users-head .label{
      font-weight: 900;
      font-size: 12px;
      letter-spacing: .3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .users{
      flex: 1;
      overflow: auto;
      padding-right: 6px;
    }
    .user{
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      background: var(--panel2);
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .user:hover{ transform: translateY(-1px); }
    .user.active{
      border-color: rgba(124,92,255,.45);
      background: rgba(124,92,255,.12);
    }
    .avatar{
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
      border: 1px solid var(--stroke);
      display: grid;
      place-items: center;
      font-weight: 900;
      color: var(--text);
      flex: 0 0 34px;
      overflow: hidden;
    }
    .avatar img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .user .meta{
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .user .name{
      font-weight: 900;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .user .email{
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Chat */
    .chat{
      display:flex;
      flex-direction:column;
      height:100%;
      min-height:0;
    }

    .chat-header{
      height: 64px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--stroke);
      background: var(--panel);
      backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .chat-left{
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mobile-menu{
      display: none;
      border: 1px solid var(--stroke);
      background: var(--panel2);
      color: var(--text);
      border-radius: 12px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
    }

    .chat-title{
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .chat-title .top{
      font-weight: 950;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-title .bottom{
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .messages{
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble{
      max-width: min(620px, 78%);
      border-radius: 18px;
      padding: 10px 12px;
      border: 1px solid var(--stroke);
      background: var(--other);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 28px rgba(0,0,0,.18);
      position: relative;
    }
    .bubble.me{
      margin-left: auto;
      border-color: rgba(255,255,255,.10);
      background: var(--me);
      color: #fff;
      box-shadow: 0 12px 32px rgba(0,0,0,.22);
    }

    .bubble .text{
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble .time{
      margin-top: 6px;
      font-size: 11px;
      opacity: .75;
      text-align: right;
      color: inherit;
    }

    .bubble img{
      margin-top: 8px;
      max-width: 260px;
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.16);
      display: block;
    }

    .composer{
      padding: 14px 16px;
      border-top: 1px solid var(--stroke);
      background: var(--panel);
      backdrop-filter: blur(18px);
      display: none;
      gap: 10px;
      align-items: center;
    }

    .field{
      flex: 1;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--panel2);
      border: 1px solid var(--stroke);
      box-shadow: 0 10px 26px rgba(0,0,0,.14);
    }

    .input{
      flex: 1;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
    }

    .file{
      display: none;
    }
    .icon-btn{
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.08);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform .12s ease, opacity .12s ease;
      user-select: none;
    }
    .icon-btn:hover{ transform: translateY(-2px); }
    .send-btn{
      width: 46px;
      height: 46px;
      border-radius: 16px;
      border: 0;
      cursor: pointer;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: var(--shadow2);
      transition: transform .12s ease, opacity .12s ease;
    }
    .send-btn:hover{ transform: translateY(-2px); }
    .send-btn:active{ transform: translateY(0px); opacity: .92; }

    /* Scrollbars */
    .users::-webkit-scrollbar,
    .messages::-webkit-scrollbar{ width: 10px; }
    .users::-webkit-scrollbar-thumb,
    .messages::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    body.theme-light .users::-webkit-scrollbar-thumb,
    body.theme-light .messages::-webkit-scrollbar-thumb{
      background: rgba(15,23,42,.12);
      background-clip: padding-box;
    }

    /* Mobile */
    @media (max-width: 920px){
      .app{ grid-template-columns: 1fr; }
      .sidebar{
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: min(360px, 86vw);
        transform: translateX(-110%);
        transition: transform .18s ease;
        z-index: 20;
      }
      .sidebar.open{ transform: translateX(0%); }
      .mobile-menu{ display: grid; place-items: center; }
      .overlay{
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.40);
        backdrop-filter: blur(2px);
        z-index: 10;
        display: none;
      }
      .overlay.show{ display: block; }
      .bubble{ max-width: 86%; }
    }
  </style>
</head>

<body class="theme-dark">
  <div class="overlay" id="overlay"></div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="title">
          <h1>ZXC Chat</h1>
          <div class="sub" id="authHint">Войдите, чтобы начать</div>
        </div>
        <div class="pill-group" title="Тема">
          <button class="pill" id="tDark"  type="button">🌙</button>
          <button class="pill" id="tLight" type="button">☀️</button>
          <button class="pill" id="tMasha" type="button">🌸</button>
        </div>
      </div>

      <div class="auth-row">
        <button class="btn" id="googleLogin" type="button">Google</button>
        <button class="btn apple" id="appleLogin" type="button"> Apple</button>
        <button class="btn ghost" id="logout" type="button" style="display:none;">Выйти</button>
      </div>

      <div class="users-head">
        <div class="label">Пользователи</div>
      </div>

      <div class="users" id="users"></div>
    </aside>

    <!-- Chat -->
    <main class="chat">
      <header class="chat-header">
        <div class="chat-left">
          <button class="mobile-menu" id="menuBtn" type="button" aria-label="Меню">☰</button>
          <div class="chat-title">
            <div class="top" id="chatName">Выберите пользователя</div>
            <div class="bottom" id="chatSub">Чат появится здесь</div>
          </div>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <footer class="composer" id="sendForm">
        <div class="field">
          <input class="input" id="messageText" type="text" placeholder="Введите сообщение…" autocomplete="off" />
          <input class="file" id="messageFile" type="file" accept="image/*" />
          <button class="icon-btn" id="attachBtn" type="button" title="Прикрепить">📎</button>
        </div>
        <button class="send-btn" id="sendMessage" type="button" title="Отправить">➤</button>
      </footer>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, OAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, serverTimestamp, updateDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ===== Firebase config =====
    const firebaseConfig = {
      apiKey: "AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
      authDomain: "zxc1234-668aa.firebaseapp.com",
      projectId: "zxc1234-668aa",
      storageBucket: "zxc1234-668aa.appspot.com",
      messagingSenderId: "587825633345",
      appId: "1:587825633345:web:2f098c987369bc934c0ec0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const googleProvider = new GoogleAuthProvider();
    const appleProvider = new OAuthProvider("apple.com");

    // ===== DOM =====
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const menuBtn = document.getElementById("menuBtn");

    const authHint = document.getElementById("authHint");
    const googleLoginBtn = document.getElementById("googleLogin");
    const appleLoginBtn = document.getElementById("appleLogin");
    const logoutBtn = document.getElementById("logout");

    const usersDiv = document.getElementById("users");
    const chatNameEl = document.getElementById("chatName");
    const chatSubEl = document.getElementById("chatSub");

    const messagesDiv = document.getElementById("messages");
    const sendForm = document.getElementById("sendForm");
    const messageText = document.getElementById("messageText");
    const messageFile = document.getElementById("messageFile");
    const attachBtn = document.getElementById("attachBtn");
    const sendMessageBtn = document.getElementById("sendMessage");

    // Theme buttons
    const tDark = document.getElementById("tDark");
    const tLight = document.getElementById("tLight");
    const tMasha = document.getElementById("tMasha");

    // ===== State =====
    let currentUser = null;
    let currentChatId = null;

    let usersUnsub = null;
    let messagesUnsub = null;

    // ===== Helpers =====
    function setTheme(theme){
      document.body.classList.remove("theme-dark","theme-light","theme-masha");
      document.body.classList.add(theme);
      localStorage.setItem("theme", theme);

      [tDark,tLight,tMasha].forEach(b => b.classList.remove("active"));
      if(theme === "theme-dark") tDark.classList.add("active");
      if(theme === "theme-light") tLight.classList.add("active");
      if(theme === "theme-masha") tMasha.classList.add("active");
    }

    function initials(nameOrEmail){
      const s = (nameOrEmail || "").trim();
      if(!s) return "?";
      const parts = s.split(/\s+/).filter(Boolean);
      const a = parts[0]?.[0] ?? "?";
      const b = parts[1]?.[0] ?? "";
      return (a + b).toUpperCase();
    }

    function formatTime(ts){
      try{
        const d = ts?.toDate ? ts.toDate() : null;
        if(!d) return "";
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }catch{
        return "";
      }
    }

    function closeSidebar(){
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    }
    function openSidebar(){
      sidebar.classList.add("open");
      overlay.classList.add("show");
    }

    // ===== Mobile menu =====
    menuBtn.addEventListener("click", () => {
      if(sidebar.classList.contains("open")) closeSidebar();
      else openSidebar();
    });
    overlay.addEventListener("click", closeSidebar);

    // ===== Theme init =====
    setTheme(localStorage.getItem("theme") || "theme-dark");
    tDark.addEventListener("click", () => setTheme("theme-dark"));
    tLight.addEventListener("click", () => setTheme("theme-light"));
    tMasha.addEventListener("click", () => setTheme("theme-masha"));

    // ===== Auth =====
    googleLoginBtn.onclick = async () => {
      try{
        await signInWithPopup(auth, googleProvider);
      }catch(e){
        alert(e?.message || "Ошибка входа");
        console.error(e);
      }
    };

    appleLoginBtn.onclick = async () => {
      try{
        await signInWithPopup(auth, appleProvider);
      }catch(e){
        alert(e?.message || "Ошибка входа Apple");
        console.error(e);
      }
    };

    logoutBtn.onclick = async () => {
      try{
        await signOut(auth);
      }catch(e){
        alert(e?.message || "Ошибка выхода");
        console.error(e);
      }
    };

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;

      if(usersUnsub){ usersUnsub(); usersUnsub = null; }
      if(messagesUnsub){ messagesUnsub(); messagesUnsub = null; }
      currentChatId = null;

      usersDiv.innerHTML = "";
      messagesDiv.innerHTML = "";
      chatNameEl.textContent = "Выберите пользователя";
      chatSubEl.textContent = "Чат появится здесь";

      if(!user){
        googleLoginBtn.style.display = "inline-flex";
        appleLoginBtn.style.display = "inline-flex";
        logoutBtn.style.display = "none";
        sendForm.style.display = "none";
        authHint.textContent = "Войдите, чтобы начать";
        return;
      }

      googleLoginBtn.style.display = "none";
      appleLoginBtn.style.display = "none";
      logoutBtn.style.display = "inline-flex";
      sendForm.style.display = "flex";
      authHint.textContent = user.displayName ? `Вы вошли как ${user.displayName}` : `Вы вошли`;

      try{
        const userRef = doc(db, "users", user.uid);
        await setDoc(userRef, {
          name: user.displayName || "",
          email: user.email || "",
          photoURL: user.photoURL || "",
          updatedAt: serverTimestamp()
        }, { merge: true });
      }catch(e){
        console.error("Failed to save user:", e);
        alert("Не удалось записать пользователя в Firestore. Проверь Rules: " + (e?.message || e));
      }

      subscribeUsers();
    });

    // ===== Users list =====
    function subscribeUsers(){
      const usersRef = collection(db, "users");

      usersUnsub = onSnapshot(usersRef, (snap) => {
        usersDiv.innerHTML = "";
        let count = 0;

        snap.forEach((d) => {
          if(d.id === currentUser.uid) return;

          const data = d.data() || {};
          const name = data.name || data.email || "Пользователь";
          const email = data.email || "";

          const item = document.createElement("div");
          item.className = "user";

          const avatar = document.createElement("div");
          avatar.className = "avatar";
          if(data.photoURL){
            const img = document.createElement("img");
            img.src = data.photoURL;
            img.alt = name;
            avatar.appendChild(img);
          }else{
            avatar.textContent = initials(name);
          }

          const meta = document.createElement("div");
          meta.className = "meta";

          const nm = document.createElement("div");
          nm.className = "name";
          nm.textContent = name;

          const em = document.createElement("div");
          em.className = "email";
          em.textContent = email;

          meta.appendChild(nm);
          meta.appendChild(em);

          item.appendChild(avatar);
          item.appendChild(meta);

          item.addEventListener("click", () => openChat(d.id, name));
          usersDiv.appendChild(item);

          count++;
        });

        if(count === 0){
          const empty = document.createElement("div");
          empty.style.color = "var(--muted)";
          empty.style.fontSize = "13px";
          empty.style.padding = "10px";
          empty.textContent = "Пока нет других пользователей. Зайди с другого аккаунта Google/Apple, чтобы протестировать чат.";
          usersDiv.appendChild(empty);
        }
      }, (err) => {
        console.error(err);
        alert("Ошибка чтения users. Проверь Rules: " + (err?.message || err));
      });
    }

    // ===== Open chat =====
    function openChat(otherUid, otherName){
      closeSidebar();

      messagesDiv.innerHTML = "";
      chatNameEl.textContent = otherName;
      chatSubEl.textContent = "Сообщения синхронизируются в реальном времени";

      currentChatId = [currentUser.uid, otherUid].sort().join("_");
      const chatRef = doc(db, "chats", currentChatId);

      setDoc(chatRef, {
        users: [currentUser.uid, otherUid],
        lastMessage: "",
        updatedAt: serverTimestamp()
      }, { merge: true }).catch((e) => {
        console.error(e);
        alert("Не удалось создать/открыть чат. Проверь Rules: " + (e?.message || e));
      });

      const messagesRef = collection(chatRef, "messages");
      if(messagesUnsub) messagesUnsub();

      messagesUnsub = onSnapshot(
        query(messagesRef, orderBy("timestamp")),
        (snap) => {
          messagesDiv.innerHTML = "";

          snap.forEach((d) => {
            const data = d.data() || {};
            const bubble = document.createElement("div");
            bubble.className = "bubble " + (data.senderId === currentUser.uid ? "me" : "other");

            if(data.text){
              const textEl = document.createElement("div");
              textEl.className = "text";
              textEl.textContent = data.text;
              bubble.appendChild(textEl);
            }

            if(data.imageBase64){
              const img = document.createElement("img");
              img.src = data.imageBase64;
              img.alt = "image";
              bubble.appendChild(img);
            }

            const timeEl = document.createElement("div");
            timeEl.className = "time";
            timeEl.textContent = formatTime(data.timestamp);
            bubble.appendChild(timeEl);

            messagesDiv.appendChild(bubble);
          });

          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        },
        (err) => {
          console.error(err);
          alert("Ошибка чтения сообщений. Проверь Rules: " + (err?.message || err));
        }
      );
    }

    // ===== Send message =====
    attachBtn.addEventListener("click", () => messageFile.click());

    messageText.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        sendMessageBtn.click();
      }
    });

    sendMessageBtn.onclick = async () => {
      if(!currentChatId) return alert("Выберите пользователя слева");

      const text = (messageText.value || "").trim();
      const hasFile = messageFile.files && messageFile.files.length > 0;

      if(!text && !hasFile) return;

      if(hasFile){
        const file = messageFile.files[0];
        const reader = new FileReader();
        reader.onload = async () => {
          await sendMessageToChat(text, reader.result);
          messageText.value = "";
          messageFile.value = "";
          messageText.focus();
        };
        reader.readAsDataURL(file);
      }else{
        await sendMessageToChat(text, null);
        messageText.value = "";
        messageFile.value = "";
        messageText.focus();
      }
    };

    async function sendMessageToChat(text, imageBase64){
      const chatRef = doc(db, "chats", currentChatId);
      const messagesRef = collection(chatRef, "messages");

      try{
        await addDoc(messagesRef, {
          senderId: currentUser.uid,
          text: text || "",
          imageBase64: imageBase64 || null,
          timestamp: serverTimestamp()
        });

        await updateDoc(chatRef, {
          lastMessage: (text && text.length) ? text : (imageBase64 ? "📷 Картинка" : ""),
          updatedAt: serverTimestamp()
        });
      }catch(e){
        console.error(e);
        alert("Не удалось отправить сообщение. Проверь Rules: " + (e?.message || e));
      }
    }
  </script>
</body>
</html>
