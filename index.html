<!DOCTYPE html>
<html>
<head>
  <title>Status Monitor</title>
</head>
<body>

<h2>Статус</h2>

<input id="status" placeholder="Введите статус">
<button onclick="updateStatus()">Обновить</button>

<p id="currentStatus"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = "https://omqqenqlalqzjsbjhqgz.supabase.co";
  const supabaseKey = "sb_publishable_MMUvjysVPwIxm7N8oSvTuA_9_3GZWU9";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  const userId = "ТВОЙ_ID_ИЗ_ТАБЛИЦЫ"; // ← вставь сюда

  async function loadStatus() {
    const { data } = await client
      .from('profiles')
      .select('status')
      .eq('id', userId)
      .single();

    document.getElementById("currentStatus").innerText =
      "Текущий статус: " + data.status;
  }

  async function updateStatus() {
    const newStatus = document.getElementById("status").value;

    const { error } = await client
      .from('profiles')
      .update({ status: newStatus })
      .eq('id', userId);

    if (!error) {
      loadStatus();
    }
  }

  loadStatus();
</script>

</body>
</html>
