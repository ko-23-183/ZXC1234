<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Firebase Google Auth</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 420px;
  margin-top: 40px;
}

button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.google { background: #4285F4; color: white; }
.logout { background: #ff4b4b; color: white; }
.post { background: #222; padding: 10px; margin: 10px 0; border-radius: 10px; }
</style>
</head>

<body>

<div class="container">

<h2>🔥 Firebase + Google Auth</h2>

<button class="google" onclick="login()">Войти через Google</button>
<button class="logout" onclick="logout()">Выйти</button>

<hr>

<div id="app" style="display:none;">
  <input id="text" placeholder="Напиши пост">
  <button onclick="addPost()">Отправить</button>

  <div id="feed"></div>
</div>

<p id="status"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9L_I4iP-Kr-GeQiVCtrywRDLwy0JxO1Y",
  authDomain: "zxc1234-668aa.firebaseapp.com",
  projectId: "zxc1234-668aa",
  storageBucket: "zxc1234-668aa.firebasestorage.app",
  messagingSenderId: "587825633345",
  appId: "1:587825633345:web:2f098c987369bc934c0ec0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// 🔐 LOGIN GOOGLE
window.login = async function() {
  await signInWithPopup(auth, provider);
};

// 🚪 LOGOUT
window.logout = async function() {
  await signOut(auth);
};

// 👀 AUTH STATE
onAuthStateChanged(auth, (user) => {

  if (user) {
    document.getElementById("app").style.display = "block";
    document.getElementById("status").innerText = "Привет " + user.email;
    loadPosts();
  } else {
    document.getElementById("app").style.display = "none";
    document.getElementById("status").innerText = "Вы не вошли";
  }
});

// ➕ ADD POST
window.addPost = async function() {
  const text = document.getElementById("text").value;

  await addDoc(collection(db, "posts"), {
    text: text,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  document.getElementById("text").value = "";
};

// 🔄 REALTIME
function loadPosts() {
  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

  onSnapshot(q, (snapshot) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      feed.innerHTML += `
        <div class="post">
          <p>${data.text}</p>
        </div>
      `;
    });
  });
}

</script>

</body>
</html>
